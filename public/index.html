<!DOCTYPE html>
<html>
<head>
    <title>Xeno - Sign Up</title>
    <style>body{font-family:Arial;max-width:400px;margin:100px auto;padding:20px;background:#f5f5f5;}input,button{width:100%;padding:12px;margin:10px 0;font-size:16px;border-radius:5px;border:1px solid #ddd;box-sizing:border-box;}button{background:#007bff;color:white;border:none;cursor:pointer;font-weight:bold;}button:hover{background:#0056b3;}</style>
</head>
<body>
    <h1>🎉 Welcome to Xeno</h1>
    <p>Create your free account:</p>
    <input id="username" placeholder="Choose username" required>
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
